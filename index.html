<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>トラフグXデー予測</title>
    <meta
      name="description"
      content="萬栄丸のトラフグ釣果と気温・水温・月齢から、Xデー確率と予測匹数を日別に可視化するグラフィック。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="credit">作:データアングラー</p>
        <p class="eyebrow">トラフグ</p>
        <h1 id="title">Xデー予測</h1>
        <div class="meta">
          <span id="generatedAt">読込中</span>
          <span id="threshold">-</span>
        </div>
      </header>

      <section class="top-days" id="topDays" aria-label="注目日"></section>

      <section class="sim-panel">
        <div class="sim-head">
          <span>回帰シミュレーター</span>
          <span id="simHint">即時計算</span>
        </div>
        <div class="sim-grid">
          <div class="sim-controls">
            <label class="slider-card" for="airSlider">
              <span>気温</span>
              <strong id="airValue">-</strong>
              <input id="airSlider" type="range" />
            </label>
            <label class="slider-card" for="seaSlider">
              <span>水温</span>
              <strong id="seaValue">-</strong>
              <input id="seaSlider" type="range" />
            </label>
            <label class="slider-card" for="moonSlider">
              <span>月齢</span>
              <strong id="moonValue">-</strong>
              <input id="moonSlider" type="range" />
            </label>
          </div>

          <div class="sim-metrics">
            <article class="metric-card">
              <span>Xデー確率</span>
              <strong id="simProbability">-</strong>
            </article>
            <article class="metric-card">
              <span>予測最小匹数</span>
              <strong id="simMin">-</strong>
            </article>
            <article class="metric-card">
              <span>予測最大匹数</span>
              <strong id="simMax">-</strong>
            </article>
          </div>
        </div>
      </section>

      <section class="chart-panel">
        <div class="chart-header">
          <span id="rangeLabel">2026</span>
          <span id="todayLabel"></span>
        </div>
        <div class="chart-scroller" id="probChartScroller">
          <canvas id="probChart" width="1800" height="520" aria-label="Xデー確率グラフ"></canvas>
          <div class="tooltip" id="probTooltip" hidden></div>
        </div>
      </section>

      <section class="chart-panel compact">
        <div class="chart-header">
          <span>予測最小匹数</span>
          <span>匹 / 日</span>
        </div>
        <div class="chart-scroller" id="minChartScroller">
          <canvas id="minChart" width="1800" height="360" aria-label="予測最小匹数グラフ"></canvas>
          <div class="tooltip" id="minTooltip" hidden></div>
        </div>
      </section>

      <section class="chart-panel compact">
        <div class="chart-header">
          <span>予測最大匹数</span>
          <span>匹 / 日</span>
        </div>
        <div class="chart-scroller" id="maxChartScroller">
          <canvas id="maxChart" width="1800" height="360" aria-label="予測最大匹数グラフ"></canvas>
          <div class="tooltip" id="maxTooltip" hidden></div>
        </div>
      </section>

      <footer class="foot">
        <span>萬栄丸 釣果</span>
        <span>Open-Meteo 気象データ</span>
        <a href="https://x.com/data_angler?s=20" target="_blank" rel="noreferrer">Xアカウント</a>
      </footer>
    </main>
    <script src="./script.js" type="module"></script>
  </body>
</html>

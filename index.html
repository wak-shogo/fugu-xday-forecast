<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>船宿別 魚種別 Xデー予測</title>
    <meta
      name="description"
      content="釣割の船宿釣果から、魚種ごとのXデー確率と予測下限・上限を日別に可視化する静的ページ。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="credit">作:データアングラー</p>
        <p class="eyebrow">釣割 船宿別予測</p>
        <h1 id="title">読込中</h1>
        <div class="meta">
          <span id="generatedAt">読込中</span>
          <span id="summaryMeta">-</span>
        </div>
      </header>

      <section class="chooser">
        <div class="chooser-grid">
          <label class="select-card" for="shipSelect">
            <span>船宿</span>
            <select id="shipSelect"></select>
          </label>
          <label class="select-card" for="speciesSelect">
            <span>魚種</span>
            <select id="speciesSelect"></select>
          </label>
        </div>
      </section>

      <section class="top-days" id="topDays" aria-label="注目日"></section>

      <section class="sim-panel">
        <div class="sim-head">
          <span>回帰シミュレーター</span>
          <span id="simHint">即時計算</span>
        </div>
        <div class="sim-grid">
          <div class="sim-controls">
            <label class="slider-card" for="airSlider">
              <span>気温</span>
              <strong id="airValue">-</strong>
              <input id="airSlider" type="range" />
            </label>
            <label class="slider-card" for="seaSlider">
              <span>水温</span>
              <strong id="seaValue">-</strong>
              <input id="seaSlider" type="range" />
            </label>
            <label class="slider-card" for="moonSlider">
              <span>月齢</span>
              <strong id="moonValue">-</strong>
              <input id="moonSlider" type="range" />
            </label>
          </div>

          <div class="sim-metrics">
            <article class="metric-card">
              <span>Xデー確率</span>
              <strong id="simProbability">-</strong>
            </article>
            <article class="metric-card">
              <span id="minMetricLabel">予測下限数</span>
              <strong id="simMin">-</strong>
            </article>
            <article class="metric-card">
              <span id="maxMetricLabel">予測上限数</span>
              <strong id="simMax">-</strong>
            </article>
          </div>
        </div>
      </section>

      <section class="chart-panel">
        <div class="chart-header">
          <span id="rangeLabel">-</span>
          <span id="todayLabel">-</span>
        </div>
        <div class="chart-scroller" id="probChartScroller">
          <canvas id="probChart" width="2500" height="520" aria-label="Xデー確率グラフ"></canvas>
          <div class="tooltip" id="probTooltip" hidden></div>
        </div>
      </section>

      <section class="chart-panel compact">
        <div class="chart-header">
          <span id="minChartLabel">予測下限数</span>
          <span id="unitLabelMin">-</span>
        </div>
        <div class="chart-scroller" id="minChartScroller">
          <canvas id="minChart" width="2500" height="360" aria-label="予測下限数グラフ"></canvas>
          <div class="tooltip" id="minTooltip" hidden></div>
        </div>
      </section>

      <section class="chart-panel compact">
        <div class="chart-header">
          <span id="maxChartLabel">予測上限数</span>
          <span id="unitLabelMax">-</span>
        </div>
        <div class="chart-scroller" id="maxChartScroller">
          <canvas id="maxChart" width="2500" height="360" aria-label="予測上限数グラフ"></canvas>
          <div class="tooltip" id="maxTooltip" hidden></div>
        </div>
      </section>

      <footer class="foot">
        <span>釣割 釣果データ</span>
        <span>Open-Meteo 気象・海況データ</span>
        <a href="https://x.com/data_angler?s=20" target="_blank" rel="noreferrer">Xアカウント</a>
      </footer>
    </main>
    <script src="./script.js" type="module"></script>
  </body>
</html>
